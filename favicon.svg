<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Deep navy background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Stylised globe with meridian/latitude lines -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <!-- Vertical meridian -->
  <ellipse cx="32" cy="32" rx="8" ry="20" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Horizontal latitude -->
  <ellipse cx="32" cy="32" rx="20" ry="7" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Strategic pillar / column at centre -->
  <rect x="29" y="20" width="6" height="24" rx="2" fill="#1d4ed8" opacity="0.8"/>
  <!-- Top node / brain dot -->
  <circle cx="32" cy="17" r="4" fill="#f59e0b"/>
  <!-- Radiating lines from top node -->
  <line x1="32" y1="13" x2="32" y2="10" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="14" x2="38" y2="11" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="14" x2="26" y2="11" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
</svg>